# ==========================================================================
# Portfolio API - Application Configuration
# ==========================================================================

spring:
  application:
    name: portfolio-api

  # ---- PostgreSQL ----
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ---- JPA ----
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ---- Flyway ----
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ---- Upload de arquivos ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# ---- Servidor ----
server:
  port: 8080
  servlet:
    context-path: /api

# ---- Upload path ----
app:
  upload:
    path: ./uploads
  admin:
    secret-key: portfolio-admin-secret-2024

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method # Corrigido para kebab-case padrão do Spring 3
    tags-sorter: alpha         # Corrigido para kebab-case padrão do Spring 3
    try-it-out-enabled: true   # Corrigido para kebab-case padrão do Spring 3

# ---- Logging ----
logging:
  level:
    com.portfolio: INFO
    org.springframework: WARN
